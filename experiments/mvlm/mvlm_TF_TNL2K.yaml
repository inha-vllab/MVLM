DATA:
  MAX_SAMPLE_INTERVAL: 400
  MULTI_MODAL_LANGUAGE: True
  MULTI_MODAL_VISION: True
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  SEARCH:
    CENTER_JITTER: 3.5
    FACTOR: 4.0
    SCALE_JITTER: 0.5
    SIZE: 224
    NUMBER: 1
  STD:
  - 0.229
  - 0.224
  - 0.225
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 112
    NUMBER: 1
  TRAIN:
    DATASETS_NAME:
    - LASOT
    - VASTTRACK
    - TNL2K_train
    DATASETS_RATIO:
    - 1
    - 1
    - 1
    SAMPLE_PER_EPOCH: 100000
  USE_NLP:
    TNL2K: True
    VASTTRACK: True
    LASOT: True
MODEL:
  ENCODER:
    TYPE: fastitpnb
    STRIDE: 16
    PRETRAIN_TYPE: 'pretrained/itpn/fast_itpn_base_clipl_e1600.pt' # This parameter is not activated for now.
    PATCHEMBED_INIT: halfcopy
    DROP_PATH: 0.1
    LANGUAGE_MODEL: CLIP # CLIP
  TEXT_ENCODER:
    TYPE: ViT-L/14
    SLICING_MODE: full
  HEAD:
    TYPE: CENTER
    NUM_CHANNELS: 256
    CONV_TYPE: normal
    XAVIER_INIT: True
  PRETRAINED_MODEL: null  # Set to null - weights loaded via --checkpoint parameter
TRAIN:
  TYPE: text_frozen
  ENCODER_MULTIPLIER: 0.1
  BATCH_SIZE: 80
  EPOCH: 60
  GRAD_CLIP_NORM: 0.1
  LR: 0.0005
  LR_DROP_EPOCH: 54
  NUM_WORKER: 10
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  WEIGHT_DECAY: 0.0001
  CM_LOSS: True
  CM_WEIGHT: 0.5 
TEST:
  EPOCH: 60
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 224
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 112
  WINDOW: True
  NUM_TEMPLATES: 1
  UPDATE_INTERVALS:
    DEFAULT: 1
  UPDATE_THRESHOLD:
    DEFAULT: 0.70
  MULTI_MODAL_VISION:
    DEFAULT: True
  MULTI_MODAL_LANGUAGE:
    DEFAULT: True
  USE_NLP:
    DEFAULT: True
    TNL2K: True
    VASTTRACK: True
    LASOT: True
  MVLM:
    ALPHA_CORR: 0.7
    TAU: 0.0
    OMEGA: 0.6
    LAMBDA: 0.7
    PSI_OUT: 0.1
